aid: stackadapt
name: StackAdapt
description: StackAdapt is an AI-powered programmatic advertising platform with REST
  and GraphQL APIs for managing campaigns, ad groups, creatives, targeting segments,
  pixel tracking, and performance reporting across native, display, video, connected
  TV, audio, and digital out-of-home channels.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/stackadapt/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
- Programmatic Advertising
- Digital Advertising
- Campaign Management
- Ad Tech
- DSP
- Demand-Side Platform
- Native Advertising
- Display Advertising
- Video Advertising
- Connected TV
- Audience Targeting
- Real-Time Bidding
- Conversion Tracking
- Performance Reporting
apis:
- aid: stackadapt:rest-api
  name: StackAdapt REST API
  description: Read-only REST API for fetching reporting data across dimensions and
    metrics to analyze campaign performance. Write operations are deprecated; use
    the GraphQL API for write operations.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.stackadapt.com/
  baseURL: https://api.stackadapt.com/service/v2
  tags:
  - Reporting
  - Campaigns
  - Performance Data
  - Analytics
  properties:
  - type: Documentation
    url: https://docs.stackadapt.com/
  - type: Authentication
    url: https://docs.stackadapt.com/
- aid: stackadapt:graphql-api
  name: StackAdapt GraphQL API
  description: Full-featured GraphQL API for creating and managing programmatic advertising
    campaigns, ad groups, creatives, targeting segments, pixel tracking, and performance
    reporting. The primary API for write operations on the StackAdapt platform.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.stackadapt.com/
  baseURL: https://api.stackadapt.com/graphql
  tags:
  - GraphQL
  - Campaigns
  - Ad Groups
  - Creatives
  - Targeting
  - Segments
  - Reporting
  properties:
  - type: Documentation
    url: https://docs.stackadapt.com/
  - type: SDKs
    url: https://www.npmjs.com/package/@stackadapt/pa-typescript-sdk
  - url: graphql/stackadapt-graphql.md
    type: GraphQL
- aid: stackadapt:pixel-api
  name: StackAdapt Pixel API
  description: Server-to-server API for conversion tracking and audience generation
    without requiring website pixel installation.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.stackadapt.com/
  baseURL: https://pixel.stackadapt.com
  tags:
  - Pixel
  - Conversion Tracking
  - Audiences
  - Server-to-Server
  properties:
  - type: Documentation
    url: https://docs.stackadapt.com/
- aid: stackadapt:data-taxonomy-api
  name: StackAdapt Data Taxonomy API
  description: API for secure data sharing and audience synchronization with third-party
    platforms and data partners.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.stackadapt.com/
  baseURL: https://api.stackadapt.com
  tags:
  - Data Sharing
  - Audience Sync
  - Data Taxonomy
  - Third-Party Integration
  properties:
  - type: Documentation
    url: https://docs.stackadapt.com/
- aid: stackadapt:mcp-server
  name: StackAdapt MCP Server
  description: Model Context Protocol server enabling AI agents (Claude, ChatGPT)
    to interact with the StackAdapt platform programmatically via the GraphQL API.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.stackadapt.com/
  baseURL: https://api.stackadapt.com
  tags:
  - MCP
  - AI Agents
  - Automation
  - Claude
  - ChatGPT
  properties:
  - type: Documentation
    url: https://docs.stackadapt.com/
