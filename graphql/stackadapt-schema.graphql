"""
This object represents a channel's potential metrics when considered alongside
other selected channels within a campaign forecast. It is influenced by various
targeting parameters such as geography, audience, inventory, bid, and budget.
The calculations for this object are always confined to the scope of the specific
 property it falls under. For instance, if it is nested under 'inventory',
  all fields within this object will be calculated without taking into account
  bid and budget considerations.
"""
