  """Represents a potential channel that could be added to a multi-channel forecast."""
  channel: CampaignType
  """Represents the potential percentage increase in unique new users a forecast could
achieve if this specific channel were added to the current selections. This value
accounts for any overlap between existing and new channels to ensure uniqueness."""
  incrementalReach: Float
  """Represents the potential percentage increase in impressions a forecast could achieve
if this channel were added. Overlap is not factored, as impressions are inherently
unique across different channels."""
  potentialImpressions: Float
  """Represents the raw total reach of all users available within this channel, based
on the targeting applied up to the current step in the forecast."""
  reach: BigInt
}

